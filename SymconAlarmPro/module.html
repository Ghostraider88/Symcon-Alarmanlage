<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Fallbacks for the Symcon theme variables (used when opened standalone). */
        :root {
            --accent-color: #1abc9c;
            --content-color: #2b2b2b;
            --card-color: #ffffff;
            --text-muted: #999;
            --group-bg: rgba(0, 0, 0, 0.04);
            --div-clr: rgba(0, 0, 0, 0.08);
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            /* Leave room at the top for the Symcon tile title bar + fullscreen icon. */
            padding: 52px 2px 2px;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--content-color);
            background: transparent;
        }

        .card {
            background: var(--card-color);
            border-radius: 6px;
            padding: 10px 12px;
            border: 1px solid var(--accent-color);
            border-left: 3px solid var(--state-color, var(--accent-color));
        }

        .head {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .head .ico {
            font-size: 20px;
            color: var(--state-color, var(--accent-color));
            width: 26px;
            text-align: center;
        }

        .head .titles { flex: 1; min-width: 0; }
        .head .name { font-size: 12px; color: var(--text-muted); line-height: 1.2; }
        .head .state { font-size: 17px; font-weight: 600; color: var(--state-color, var(--content-color)); }
        .head .mode { font-size: 12px; color: var(--text-muted); }

        .count {
            font-size: 26px;
            font-weight: 600;
            color: var(--state-color, var(--content-color));
            margin-top: 6px;
        }

        .trouble {
            margin-top: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            background: rgba(244, 67, 54, 0.12);
            border-left: 3px solid #f44336;
            font-size: 12px;
        }

        .meta { margin-top: 8px; font-size: 12px; line-height: 1.6; }
        .meta .row i { width: 16px; color: var(--text-muted); margin-right: 6px; }
        .meta .row .lbl { color: var(--text-muted); }

        .pin { margin-top: 10px; display: none; }
        .pin input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--div-clr);
            background: var(--card-color);
            color: var(--content-color);
            font-family: inherit;
            box-sizing: border-box;
        }

        .buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .buttons button {
            flex: 1 1 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 6px;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            background: transparent;
            color: var(--content-color);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .buttons button:hover { background: var(--accent-color); color: #fff; }
        .buttons button i { font-size: 13px; }

        .grp-hdr {
            background: var(--group-bg);
            border-left: 3px solid var(--accent-color);
            padding: 4px 7px;
            margin-top: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            border-radius: 3px;
        }

        .sensor-cols { display: flex; gap: 10px; margin-top: 6px; }
        .sensor-cols .col { flex: 1 1 0; min-width: 0; }
        .sensor-cols .col-hdr {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--text-muted); margin-bottom: 3px; padding: 0 4px;
        }
        .sensor-list { font-size: 12px; }
        .sensor-list table { width: 100%; border-collapse: collapse; }
        .sensor-list td { padding: 3px 4px; border-bottom: 1px solid var(--div-clr); vertical-align: middle; }
        .sensor-list .s-ico { width: 20px; color: var(--text-muted); }
        .sensor-list .s-st { width: 60px; text-align: right; font-weight: 600; font-size: 11px; white-space: nowrap; }
        .sensor-list .s-st.open { color: #f44336; }
        .sensor-list .s-st.closed { color: #4caf50; }
        .sensor-list .empty { color: var(--text-muted); font-size: 11px; padding: 3px 4px; }

        .history { margin-top: 6px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .history table { width: 100%; border-collapse: collapse; }
        .history td { padding: 3px 4px; border-bottom: 1px solid var(--div-clr); vertical-align: top; }
        .history .t { white-space: nowrap; color: var(--text-muted); width: 1%; padding-right: 8px; }
    </style>
</head>
<body>
<div class="card" id="ac-card">
    <div class="head">
        <i class="fa-solid fa-shield-halved ico" id="ac-ico"></i>
        <div class="titles">
            <div class="state" id="ac-state">—</div>
        </div>
        <div class="mode" id="ac-mode"></div>
    </div>

    <div class="count" id="ac-count"></div>
    <div class="trouble" id="ac-trouble" style="display:none"></div>

    <div class="meta" id="ac-meta"></div>

    <div class="pin" id="ac-pin">
        <input type="password" id="ac-pin-input" placeholder="PIN" inputmode="numeric">
    </div>

    <div class="buttons" id="ac-buttons">
        <button id="btn-arm-night" onclick="acAction('ArmNight')"><i class="fa-solid fa-moon"></i><span>Nacht</span></button>
        <button id="btn-arm-away"  onclick="acAction('ArmAway')"><i class="fa-solid fa-lock"></i><span>Scharf</span></button>
        <button id="btn-disarm"    onclick="acAction('Disarm')"><i class="fa-solid fa-lock-open"></i><span>Unscharf</span></button>
        <button id="btn-ack"       onclick="acAction('Acknowledge')"><i class="fa-solid fa-check"></i><span>Quitt.</span></button>
        <button id="btn-reset"     onclick="acAction('Reset')"><i class="fa-solid fa-rotate-left"></i><span>Reset</span></button>
    </div>

    <div class="grp-hdr" id="ac-sens-hdr" style="display:none">Sensoren</div>
    <div class="sensor-cols" id="ac-sens-cols" style="display:none">
        <div class="col">
            <div class="col-hdr">Tür / Fenster</div>
            <div class="sensor-list" id="ac-contacts"></div>
        </div>
        <div class="col">
            <div class="col-hdr">Bewegung</div>
            <div class="sensor-list" id="ac-motion"></div>
        </div>
    </div>

    <div class="grp-hdr" id="ac-hist-hdr" style="display:none">Verlauf</div>
    <div class="history" id="ac-history"></div>
</div>

<script>
    var acState = /*INITIAL_STATE*/null;

    function acAction(ident) {
        var pinEl = document.getElementById('ac-pin-input');
        var pin = pinEl ? (pinEl.value || '') : '';
        requestAction(ident, pin);
        if (pinEl) { pinEl.value = ''; }
    }

    function acEscape(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
    }

    function acRender(s) {
        if (!s) { return; }
        acState = s;
        var card = document.getElementById('ac-card');
        card.style.setProperty('--state-color', s.color || 'var(--accent-color)');

        var ico = document.getElementById('ac-ico');
        ico.className = 'fa-solid ' + (s.icon || 'fa-shield-halved') + ' ico';

        document.getElementById('ac-state').textContent = s.stateName || '';
        document.getElementById('ac-mode').textContent = s.modeName || '';

        var count = '';
        if (s.exitRemaining > 0) { count = '⏳ ' + s.exitRemaining + ' s'; }
        else if (s.entryRemaining > 0) { count = '⚠ ' + s.entryRemaining + ' s'; }
        document.getElementById('ac-count').textContent = count;
        document.getElementById('ac-count').style.display = count ? 'block' : 'none';

        var trouble = document.getElementById('ac-trouble');
        if (s.trouble) {
            trouble.style.display = 'block';
            trouble.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ' + acEscape(s.troubleText || '');
        } else {
            trouble.style.display = 'none';
        }

        var meta = '';
        if (s.bypass) { meta += '<div class="row"><i class="fa-solid fa-ban"></i><span class="lbl">Bypass:</span> ' + acEscape(s.bypass) + '</div>'; }
        if (s.lastTrigger) { meta += '<div class="row"><i class="fa-solid fa-bullseye"></i><span class="lbl">Auslöser:</span> ' + acEscape(s.lastTrigger) + (s.lastZone ? ' (' + acEscape(s.lastZone) + ')' : '') + '</div>'; }
        document.getElementById('ac-meta').innerHTML = meta;

        document.getElementById('ac-pin').style.display = s.pinRequired ? 'block' : 'none';

        // Show/hide arm and disarm buttons depending on PIN requirements.
        // If a PIN is required for a group of actions the user must use the
        // AlarmKeypad tile instead — showing the button without PIN input
        // would be misleading.
        var showArm    = !s.pinForArm;
        var showDisarm = !s.pinForDisarm;
        document.getElementById('btn-arm-night').style.display = showArm    ? '' : 'none';
        document.getElementById('btn-arm-away').style.display  = showArm    ? '' : 'none';
        document.getElementById('btn-disarm').style.display    = showDisarm ? '' : 'none';
        document.getElementById('btn-ack').style.display       = showDisarm ? '' : 'none';
        document.getElementById('btn-reset').style.display     = showDisarm ? '' : 'none';
        // Hide the button row entirely when all buttons are hidden.
        var anyBtn = showArm || showDisarm;
        document.getElementById('ac-buttons').style.display = anyBtn ? '' : 'none';

        // Sensor status: door/window contacts (left) and motion detectors (right).
        var contactRows = '', motionRows = '';
        (s.sensors || []).forEach(function(sv) {
            if (sv.type === 0 || sv.type === 1) {
                // 0 = door, 1 = window
                var ico = sv.type === 0 ? 'fa-door-closed' : 'fa-window-maximize';
                contactRows += '<tr><td class="s-ico"><i class="fa-solid ' + ico + '"></i></td>' +
                    '<td>' + acEscape(sv.name) + '</td>' +
                    '<td class="s-st ' + (sv.isOpen ? 'open' : 'closed') + '">' + (sv.isOpen ? 'auf' : 'zu') + '</td></tr>';
            } else if (sv.type === 2) {
                // 2 = motion detector
                motionRows += '<tr><td class="s-ico"><i class="fa-solid fa-person-walking"></i></td>' +
                    '<td>' + acEscape(sv.name) + '</td>' +
                    '<td class="s-st ' + (sv.isOpen ? 'open' : 'closed') + '">' + (sv.isOpen ? 'Bewegung' : 'frei') + '</td></tr>';
            }
        });
        var anySensors = contactRows || motionRows;
        document.getElementById('ac-sens-hdr').style.display = anySensors ? 'block' : 'none';
        document.getElementById('ac-sens-cols').style.display = anySensors ? 'flex' : 'none';
        document.getElementById('ac-contacts').innerHTML = contactRows ? '<table>' + contactRows + '</table>' : '<div class="empty">–</div>';
        document.getElementById('ac-motion').innerHTML = motionRows ? '<table>' + motionRows + '</table>' : '<div class="empty">–</div>';

        var rows = '';
        (s.history || []).forEach(function (h) {
            rows += '<tr><td class="t">' + acEscape(h.time) + '</td><td>' + acEscape(h.text) + '</td></tr>';
        });
        document.getElementById('ac-hist-hdr').style.display = rows ? 'block' : 'none';
        document.getElementById('ac-history').innerHTML = rows ? '<table>' + rows + '</table>' : '';
    }

    // Called by Symcon when the module pushes an update (UpdateVisualizationValue).
    function handleMessage(data) {
        try {
            acRender(typeof data === 'string' ? JSON.parse(data) : data);
        } catch (e) { /* ignore malformed payloads */ }
    }

    acRender(acState);
</script>
</body>
</html>
