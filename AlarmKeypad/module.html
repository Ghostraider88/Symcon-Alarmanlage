<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>

        body {
            display: flex;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 95%;
            height: 95%;
            border-radius: 10px;
            padding: 10px 20px 20px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .display {
            height: 15%;
            width: 100%;
            outline: none;
            text-align: center;
            margin-top: 10%;
            margin-bottom: 2%;
            font-size: 8vh;
        }

        .feedback {
            height: 4%;
            width: 100%;
            text-align: center;
            font-size: 2.5vh;
            font-weight: 700;
            margin-bottom: 3%;
            color: transparent;
            transition: color 0.2s;
        }
        .feedback.ok   { color: #4caf50; }
        .feedback.fail { color: #f44336; }

        .buttons {
            display: grid;
            grid-gap: 10px;
            grid-template-columns: repeat(3, 1fr);
        }

        .buttons .clear,
        .buttons .back,
        .buttons .action {
            font-size: 4vh;
        }

        .buttons button {
            padding: 10px;
            border-radius: 20%;
            border: none;
            font-size: 8vh;
            background-color: var(--buttonbg-color);
            color: var(--button-color);
        }

        .buttons button:active {
            transform: scale(0.99);
            background: #32c9ac;
            color: #fff;
        }

        .buttons button:hover {
            box-shadow: #32c9ac 0 0 1px 1px;
        }

        .buttons .clear:hover {
            box-shadow: #ff3c41 0 0 1px 1px;
        }

        .buttons .clear:active {
            background: #ff3c41;
            color: #fff;
        }

        .buttons .back:hover {
            box-shadow: #ff3c41 0 0 1px 1px;
        }

        .buttons .back:active {
            background: #ff3c41;
            color: #fff;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(128,128,128,0.2);
            margin: 10px 0 4px;
        }

    </style>
</head>

<body>
    <div class="container">
        <input type="password" class="display" disabled />
        <div class="feedback" id="feedback"></div>

        <div class="buttons">
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>

            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>

            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>

            <button class="clear" data-digit="clear">clear</button>
            <button data-digit="0">0</button>
            <button class="back" data-digit="back">⌫</button>

            <hr class="divider" style="grid-column: 1 / -1;">

            <button class="action" data-action="ArmNight">Nacht</button>
            <button class="action" data-action="ArmAway">Scharf</button>
            <button class="action" data-action="Disarm">Unscharf</button>

            <button class="action" data-action="Acknowledge" style="grid-column: 1 / 2;">Quitt.</button>
            <button class="action" data-action="Reset" style="grid-column: 2 / 3;">Reset</button>
        </div>
    </div>

    <script type="text/javascript" charset="UTF-8">

        const display  = document.querySelector('.display');
        const feedback = document.getElementById('feedback');
        let pin = '';
        let feedbackTimer = null;

        document.documentElement.style.setProperty('--button-color',   queryParameters.get('textcolor'));
        document.documentElement.style.setProperty('--buttonbg-color', queryParameters.get('backgroundColor'));

        // Digit / control buttons
        document.querySelectorAll('[data-digit]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var v = btn.getAttribute('data-digit');
                if (v === 'clear') {
                    pin = '';
                    display.value = '';
                } else if (v === 'back') {
                    pin = pin.slice(0, -1);
                    display.value = pin;
                } else {
                    pin += v;
                    display.value = pin;
                }
            });
        });

        // Action buttons — send PIN + command, then clear input
        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                requestAction(btn.getAttribute('data-action'), pin);
                pin = '';
                display.value = '';
            });
        });

        // Feedback from PHP via UpdateVisualizationValue
        function handleMessage(data) {
            var msg = JSON.parse(data);
            if (feedbackTimer) { clearTimeout(feedbackTimer); }
            feedback.textContent = msg.sendText;
            feedback.className   = 'feedback ' + (msg.ok ? 'ok' : 'fail');
            feedbackTimer = setTimeout(function() {
                feedback.textContent = '';
                feedback.className   = 'feedback';
            }, msg.timeOut || 2500);
        }

    </script>
</body>
</html>
