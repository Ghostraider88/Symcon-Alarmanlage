<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 95%;
            border-radius: 10px;
            padding: 10px 20px 20px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Display */
        .display {
            width: 100%;
            outline: none;
            border: none;
            text-align: center;
            margin-top: 8%;
            margin-bottom: 2%;
            font-size: 8vh;
            background: transparent;
            color: var(--button-color);
            letter-spacing: 4px;
        }

        /* Feedback line */
        .feedback {
            width: 100%;
            height: 20px;
            text-align: center;
            font-size: 2.2vh;
            font-weight: 700;
            line-height: 20px;
            margin-bottom: 4%;
            color: transparent;
            transition: color 0.2s;
        }
        .feedback.ok   { color: #4caf50; }
        .feedback.fail { color: #f44336; }

        /* Numpad */
        .buttons {
            display: grid;
            grid-gap: 10px;
            grid-template-columns: repeat(3, 1fr);
            margin-bottom: 10px;
        }

        .buttons button {
            padding: 10px;
            border-radius: 20%;
            border: none;
            font-size: 8vh;
            background-color: var(--buttonbg-color);
            color: var(--button-color);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .buttons button:active {
            transform: scale(0.99);
            background: #32c9ac;
            color: #fff;
        }
        .buttons button:hover {
            box-shadow: #32c9ac 0 0 1px 1px;
        }

        .buttons .btn-clear,
        .buttons .btn-back {
            font-size: 4vh;
        }
        .buttons .btn-clear:hover,
        .buttons .btn-back:hover {
            box-shadow: #ff3c41 0 0 1px 1px;
        }
        .buttons .btn-clear:active,
        .buttons .btn-back:active {
            background: #ff3c41;
            color: #fff;
        }

        /* Action buttons — 3 top row + 2 bottom row */
        .actions {
            display: grid;
            grid-gap: 8px;
            grid-template-columns: repeat(3, 1fr);
            margin-bottom: 6px;
        }
        .actions2 {
            display: grid;
            grid-gap: 8px;
            grid-template-columns: repeat(2, 1fr);
        }

        .actions button,
        .actions2 button {
            padding: 8px 4px;
            border-radius: 20%;
            border: none;
            font-size: 3.4vh;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            background-color: var(--buttonbg-color);
            color: var(--button-color);
        }

        .actions button:active,
        .actions2 button:active {
            transform: scale(0.99);
            background: #32c9ac;
            color: #fff;
        }
        .actions button:hover,
        .actions2 button:hover {
            box-shadow: #32c9ac 0 0 1px 1px;
        }

        .btn-disarm {
            background-color: #2e7d32 !important;
            color: #fff !important;
        }
        .btn-disarm:active { background: #1b5e20 !important; }
        .btn-disarm:hover  { box-shadow: #4caf50 0 0 1px 1px !important; }
    </style>
</head>
<body>
    <div class="container">
        <input type="password" class="display" id="display" disabled />
        <div class="feedback" id="feedback"></div>

        <div class="buttons">
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>

            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>

            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>

            <button class="btn-clear" data-digit="clear">C</button>
            <button data-digit="0">0</button>
            <button class="btn-back" data-digit="back">⌫</button>
        </div>

        <div class="actions">
            <button data-action="ArmNight">Nacht</button>
            <button data-action="ArmAway">Scharf</button>
            <button class="btn-disarm" data-action="Disarm">Unscharf</button>
        </div>
        <div class="actions2">
            <button data-action="Acknowledge">Quitt.</button>
            <button data-action="Reset">Reset</button>
        </div>
    </div>

    <script type="text/javascript" charset="UTF-8">
        const display  = document.getElementById('display');
        const feedback = document.getElementById('feedback');
        let pin = '';
        let feedbackTimer = null;

        // Theme colors from tile parameters (lorbetzki pattern)
        document.documentElement.style.setProperty('--button-color',   queryParameters.get('textcolor'));
        document.documentElement.style.setProperty('--buttonbg-color', queryParameters.get('backgroundColor'));

        // Numpad
        document.querySelectorAll('[data-digit]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var v = btn.getAttribute('data-digit');
                if (v === 'clear') {
                    pin = '';
                } else if (v === 'back') {
                    pin = pin.slice(0, -1);
                } else {
                    pin += v;
                }
                display.value = pin;
            });
        });

        // Action buttons
        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                requestAction(btn.getAttribute('data-action'), pin);
                pin = '';
                display.value = '';
            });
        });

        // Feedback from PHP → UpdateVisualizationValue → handleMessage
        function handleMessage(data) {
            var msg = JSON.parse(data);
            if (feedbackTimer) { clearTimeout(feedbackTimer); }
            feedback.textContent = msg.sendText;
            feedback.className   = 'feedback ' + (msg.ok ? 'ok' : 'fail');
            feedbackTimer = setTimeout(function() {
                feedback.textContent = '';
                feedback.className   = 'feedback';
            }, msg.timeOut || 2500);
        }
    </script>
</body>
</html>
