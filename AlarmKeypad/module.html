<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>

        body {
            display: flex;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 95%;
            height: 95%;
            border-radius: 10px;
            padding: 6px 14px 14px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .display {
            height: 12%;
            width: 100%;
            outline: none;
            text-align: center;
            margin-top: 4%;
            margin-bottom: 1%;
            font-size: 5vh;
        }

        .feedback {
            height: 3%;
            width: 100%;
            text-align: center;
            font-size: 1.8vh;
            font-weight: 700;
            margin-bottom: 2%;
            color: transparent;
            transition: color 0.2s;
        }
        .feedback.ok   { color: #4caf50; }
        .feedback.fail { color: #f44336; }

        .buttons {
            display: grid;
            grid-gap: 6px;
            grid-template-columns: repeat(3, 1fr);
        }

        .buttons .small {
            font-size: 2.5vh;
        }

        .buttons button {
            padding: 6px;
            border-radius: 20%;
            border: none;
            font-size: 5vh;
            background-color: var(--buttonbg-color);
            color: var(--button-color);
        }

        .buttons button:active {
            transform: scale(0.99);
            background: #32c9ac;
            color: #fff;
        }

        .buttons button:hover {
            box-shadow: #32c9ac 0 0 1px 1px;
        }

        .buttons .clear:hover,
        .buttons .back:hover {
            box-shadow: #ff3c41 0 0 1px 1px;
        }

        .buttons .clear:active,
        .buttons .back:active {
            background: #ff3c41;
            color: #fff;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(128,128,128,0.2);
            margin: 4px 0;
            grid-column: 1 / -1;
        }

    </style>
</head>

<body>
    <div class="container">
        <input type="password" class="display" disabled />
        <div class="feedback" id="feedback"></div>

        <div class="buttons">
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>

            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>

            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>

            <button class="clear small" data-digit="clear">clear</button>
            <button data-digit="0">0</button>
            <button class="back small" data-digit="back">⌫</button>

            <hr class="divider">

            <button class="small" data-action="ArmNight"><i class="fa-solid fa-moon"></i> Nacht</button>
            <button class="small" data-action="ArmAway"><i class="fa-solid fa-lock"></i> Scharf</button>
            <button class="small" data-action="Disarm"><i class="fa-solid fa-lock-open"></i> Unscharf</button>

            <button class="small" data-action="Acknowledge" style="grid-column: 1 / 2;"><i class="fa-solid fa-check"></i> Quitt.</button>
            <button class="small" data-action="Reset" style="grid-column: 2 / 3;"><i class="fa-solid fa-rotate-left"></i> Reset</button>
        </div>
    </div>

    <script type="text/javascript" charset="UTF-8">

        const display  = document.querySelector('.display');
        const feedback = document.getElementById('feedback');
        let pin = '';
        let feedbackTimer = null;

        document.documentElement.style.setProperty('--button-color',   queryParameters.get('textcolor'));
        document.documentElement.style.setProperty('--buttonbg-color', queryParameters.get('backgroundColor'));

        document.querySelectorAll('[data-digit]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var v = btn.getAttribute('data-digit');
                if (v === 'clear') {
                    pin = '';
                    display.value = '';
                } else if (v === 'back') {
                    pin = pin.slice(0, -1);
                    display.value = pin;
                } else {
                    pin += v;
                    display.value = pin;
                }
            });
        });

        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                requestAction(btn.getAttribute('data-action'), pin);
                pin = '';
                display.value = '';
            });
        });

        function handleMessage(data) {
            var msg = JSON.parse(data);
            if (feedbackTimer) { clearTimeout(feedbackTimer); }
            feedback.textContent = msg.sendText;
            feedback.className   = 'feedback ' + (msg.ok ? 'ok' : 'fail');
            feedbackTimer = setTimeout(function() {
                feedback.textContent = '';
                feedback.className   = 'feedback';
            }, msg.timeOut || 2500);
        }

    </script>
</body>
</html>
